<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设备控制页</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100%;
            font-family: "Microsoft YaHei", sans-serif;
            background: radial-gradient(circle at top, #12336b 0%, #08162f 45%, #020a16 100%);
            color: #fff;
        }
        .page {
            max-width: 1180px;
            margin: 0 auto;
            padding: 24px 20px 40px;
            box-sizing: border-box;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 16px;
            flex-wrap: wrap;
        }
        .title h1 {
            margin: 0 0 8px;
            font-size: 30px;
        }
        .title p {
            margin: 0;
            color: #9cdcff;
            font-size: 14px;
        }
        .btn {
            min-width: 96px;
            height: 38px;
            padding: 0 16px;
            border: 1px solid rgba(52, 157, 255, 0.85);
            border-radius: 6px;
            background: rgba(3, 35, 87, 0.78);
            color: #fff;
            cursor: pointer;
        }
        .btn.warn {
            border-color: rgba(255, 227, 74, 0.95);
            color: #ffee75;
        }
        .panel {
            background: rgba(4, 22, 58, 0.88);
            border: 1px solid rgba(55, 164, 255, 0.45);
            border-radius: 12px;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 0 18px rgba(0, 103, 255, 0.14);
            margin-bottom: 18px;
        }
        .toolbar {
            display: grid;
            grid-template-columns: 2fr 1fr auto;
            gap: 12px;
            align-items: end;
        }
        .field span {
            display: block;
            margin-bottom: 6px;
            color: #9cdcff;
            font-size: 14px;
        }
        .field select,
        .field input {
            width: 100%;
            height: 40px;
            padding: 0 12px;
            box-sizing: border-box;
            border: 1px solid rgba(52, 157, 255, 0.55);
            border-radius: 6px;
            background: rgba(7, 30, 76, 0.94);
            color: #fff;
            outline: none;
        }
        .status-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-top: 18px;
        }
        .status-card {
            padding: 18px 16px;
            border-radius: 10px;
            background: rgba(9, 37, 88, 0.75);
            border: 1px solid rgba(70, 176, 255, 0.25);
        }
        .status-card .label {
            color: #8fd2ff;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .status-card .value {
            font-size: 28px;
            font-weight: 700;
        }
        .controls {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .control-box {
            background: rgba(9, 37, 88, 0.75);
            border: 1px solid rgba(70, 176, 255, 0.25);
            border-radius: 10px;
            padding: 18px 16px;
        }
        .control-box h3 {
            margin: 0 0 14px;
            font-size: 18px;
        }
        .control-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            align-items: end;
        }
        .switch-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .log {
            min-height: 22px;
            margin-top: 10px;
            color: #8fd2ff;
            font-size: 14px;
        }
        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            min-width: 280px;
            max-width: 80vw;
            padding: 12px 16px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        .toast.show {
            display: block;
        }
        .toast.success {
            background: rgba(19, 148, 84, 0.95);
            border: 1px solid #63f3b0;
        }
        .toast.error {
            background: rgba(173, 39, 39, 0.96);
            border: 1px solid #ff9494;
        }
        @media (max-width: 900px) {
            .toolbar,
            .controls,
            .status-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="header">
            <div class="title">
                <h1>设备控制页</h1>
                <p>实现温度、湿度、烟雾浓度与开关状态的监听和控制</p>
            </div>
            <div>
                <button id="refresh_btn" class="btn">立即刷新</button>
                <button id="back_btn" class="btn warn">返回主页</button>
            </div>
        </div>

        <div class="panel">
            <div class="toolbar">
                <label class="field">
                    <span>选择设备</span>
                    <select id="device_select"></select>
                </label>
                <label class="field">
                    <span>轮询状态</span>
                    <input id="poll_status" type="text" value="每 3 秒刷新" readonly>
                </label>
                <button id="reload_devices_btn" class="btn">刷新设备</button>
            </div>

            <div class="status-grid">
                <div class="status-card">
                    <div class="label">温度</div>
                    <div id="temp_value" class="value">--</div>
                </div>
                <div class="status-card">
                    <div class="label">湿度</div>
                    <div id="humi_value" class="value">--</div>
                </div>
                <div class="status-card">
                    <div class="label">烟雾浓度</div>
                    <div id="smoke_value" class="value">--</div>
                </div>
                <div class="status-card">
                    <div class="label">设备开关 / 在线状态</div>
                    <div id="status_value" class="value">--</div>
                </div>
            </div>
            <div id="device_info" class="log">当前设备：--</div>
        </div>

        <div class="panel">
            <div class="controls">
                <div class="control-box">
                    <h3>设备开关控制</h3>
                    <div class="switch-row">
                        <button class="btn" data-control="status" data-value="true">打开设备</button>
                        <button class="btn warn" data-control="status" data-value="false">关闭设备</button>
                    </div>
                    <div class="log">说明：通过 OneNET `set-device-property` 下发设备状态。</div>
                </div>

                <div class="control-box">
                    <h3>温度控制</h3>
                    <div class="control-row">
                        <label class="field">
                            <span>设置温度值</span>
                            <input id="temp_input" type="number" step="0.1" placeholder="请输入要控制的温度">
                        </label>
                        <button class="btn" data-control="temp">下发</button>
                    </div>
                </div>

                <div class="control-box">
                    <h3>湿度控制</h3>
                    <div class="control-row">
                        <label class="field">
                            <span>设置湿度值</span>
                            <input id="humi_input" type="number" step="0.1" placeholder="请输入要控制的湿度">
                        </label>
                        <button class="btn" data-control="humi">下发</button>
                    </div>
                </div>

                <div class="control-box">
                    <h3>烟雾浓度控制</h3>
                    <div class="control-row">
                        <label class="field">
                            <span>设置烟雾浓度值</span>
                            <input id="smoke_input" type="number" step="0.1" placeholder="请输入要控制的烟雾浓度">
                        </label>
                        <button class="btn" data-control="smoke">下发</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        (function () {
            var state = {
                devices: [],
                currentRecordId: '',
                timer: null,
                isFirstLoad: true
            };

            document.getElementById('back_btn').addEventListener('click', function () {
                window.location.href = '/';
            });

            document.getElementById('refresh_btn').addEventListener('click', function () {
                loadCurrentDevice();
            });

            document.getElementById('reload_devices_btn').addEventListener('click', function () {
                loadDevices();
            });

            document.getElementById('device_select').addEventListener('change', function (event) {
                state.currentRecordId = event.target.value;
                loadCurrentDevice();
            });

            Array.prototype.forEach.call(document.querySelectorAll('[data-control]'), function (button) {
                button.addEventListener('click', function () {
                    var controlKey = button.getAttribute('data-control');
                    var rawValue = button.getAttribute('data-value');
                    var value = rawValue;
                    if (controlKey === 'temp') {
                        value = document.getElementById('temp_input').value;
                    } else if (controlKey === 'humi') {
                        value = document.getElementById('humi_input').value;
                    } else if (controlKey === 'smoke') {
                        value = document.getElementById('smoke_input').value;
                    }
                    sendControl(controlKey, value);
                });
            });

            function loadDevices() {
                return fetch('/api/devices')
                    .then(parseJson)
                    .then(function (res) {
                        state.devices = (res.data && res.data.devices) || [];
                        renderDeviceOptions();
                        if (!state.currentRecordId && state.devices.length) {
                            state.currentRecordId = state.devices[0].record_id;
                        }
                        return loadCurrentDevice();
                    })
                    .catch(function (error) {
                        showToast(getErrorMessage(error, '设备列表加载失败'), 'error');
                    });
            }

            function loadCurrentDevice() {
                if (!state.currentRecordId) {
                    setValues('--', '--', '--', '--', '--');
                    return Promise.resolve();
                }
                return fetch('/api/app-demo-device?record_id=' + encodeURIComponent(state.currentRecordId))
                    .then(parseJson)
                    .then(function (res) {
                        var data = res.data || {};
                        setValues(
                            formatMetric(data.temp, '℃'),
                            formatMetric(data.humi, '%'),
                            formatMetric(data.smoke, 'ppm'),
                            data.status === 'true' ? '开启 / 在线' : (data.status === 'false' ? '关闭 / 离线' : '未知'),
                            (data.display_name || '--') + ' / ' + (data.device_name || '--') + ' / ' + (data.device_id || '--')
                        );
                        syncInputHints(data);
                    })
                    .catch(function (error) {
                        showToast(getErrorMessage(error, '设备实时数据加载失败'), 'error');
                    });
            }

            function sendControl(controlKey, value) {
                if (!state.currentRecordId) {
                    showToast('请先选择设备', 'error');
                    return;
                }
                if ((controlKey === 'temp' || controlKey === 'humi' || controlKey === 'smoke') && value === '') {
                    showToast('请输入要下发的数值', 'error');
                    return;
                }
                var payload = {
                    record_id: state.currentRecordId
                };
                payload[controlKey] = value;
                fetch('/api/device-control', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                }).then(parseJson)
                    .then(function (res) {
                        showToast(res.msg || '控制下发成功', 'success');
                        if (controlKey === 'temp' || controlKey === 'humi' || controlKey === 'smoke') {
                            document.getElementById(controlKey + '_input').value = '';
                        }
                        setTimeout(function () {
                            loadCurrentDevice();
                        }, 800);
                    })
                    .catch(function (error) {
                        showToast(getErrorMessage(error, '控制下发失败'), 'error');
                    });
            }

            function renderDeviceOptions() {
                var select = document.getElementById('device_select');
                select.innerHTML = '';
                if (!state.devices.length) {
                    var emptyOption = document.createElement('option');
                    emptyOption.value = '';
                    emptyOption.textContent = '暂无设备';
                    select.appendChild(emptyOption);
                    return;
                }
                state.devices.forEach(function (device) {
                    var option = document.createElement('option');
                    option.value = device.record_id;
                    option.textContent = (device.id || '--') + ' / ' + (device.name || '--');
                    option.selected = option.value === state.currentRecordId;
                    select.appendChild(option);
                });
            }

            function setValues(temp, humi, smoke, status, info) {
                document.getElementById('temp_value').textContent = temp;
                document.getElementById('humi_value').textContent = humi;
                document.getElementById('smoke_value').textContent = smoke;
                document.getElementById('status_value').textContent = status;
                document.getElementById('device_info').textContent = '当前设备：' + info;
            }

            function syncInputHints(data) {
                document.getElementById('temp_input').placeholder = buildPlaceholder('温度', data.temp);
                document.getElementById('humi_input').placeholder = buildPlaceholder('湿度', data.humi);
                document.getElementById('smoke_input').placeholder = buildPlaceholder('烟雾浓度', data.smoke);
                if (state.isFirstLoad) {
                    state.isFirstLoad = false;
                }
            }

            function buildPlaceholder(label, value) {
                if (value === undefined || value === null || value === '') {
                    return '请输入要控制的' + label;
                }
                return '当前监听值：' + value;
            }

            function formatMetric(value, suffix) {
                if (value === undefined || value === null || value === '') {
                    return '--';
                }
                return value + suffix;
            }

            function showToast(text, type) {
                var toast = document.getElementById('toast');
                toast.className = 'toast show ' + (type || 'success');
                toast.textContent = text;
                clearTimeout(showToast.timer);
                showToast.timer = setTimeout(function () {
                    toast.className = 'toast';
                }, 2600);
            }

            function parseJson(response) {
                return response.json().then(function (data) {
                    if (!response.ok || data.code !== 0) {
                        throw data;
                    }
                    return data;
                });
            }

            function getErrorMessage(error, fallbackText) {
                if (error && error.msg) {
                    return error.msg;
                }
                return fallbackText;
            }

            function startPolling() {
                if (state.timer) {
                    clearInterval(state.timer);
                }
                state.timer = setInterval(function () {
                    loadCurrentDevice();
                }, 3000);
            }

            loadDevices();
            startPolling();
        })();
    </script>
</body>
</html>
