<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 设备环境监测平台</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            font-family: "Microsoft YaHei", sans-serif;
            background: radial-gradient(circle at top, #103b7a 0%, #07162d 48%, #020814 100%);
            color: #fff;
        }
        .login-page {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 420px;
            max-width: 88vw;
            padding: 32px 34px 28px;
            box-sizing: border-box;
            background: rgba(3, 18, 51, 0.92);
            border: 1px solid rgba(0, 193, 222, 0.75);
            box-shadow: 0 0 24px rgba(0, 193, 222, 0.22);
            border-radius: 12px;
        }
        .login-title {
            margin: 0 0 10px;
            font-size: 28px;
            text-align: center;
            letter-spacing: 2px;
        }
        .login-subtitle {
            margin: 0 0 24px;
            text-align: center;
            color: #9cdcff;
            font-size: 14px;
        }
        .login-field {
            margin-bottom: 16px;
        }
        .login-field span {
            display: block;
            margin-bottom: 8px;
            color: #9cdcff;
            font-size: 14px;
        }
        .login-field input {
            width: 100%;
            height: 42px;
            padding: 0 12px;
            box-sizing: border-box;
            border: 1px solid #0f5ca8;
            border-radius: 6px;
            background: rgba(8, 29, 73, 0.92);
            color: #fff;
            outline: none;
        }
        .login-btn {
            width: 100%;
            height: 44px;
            border: 1px solid #f0ff00;
            border-radius: 6px;
            background: rgba(33, 53, 5, 0.35);
            color: #f0ff00;
            font-size: 16px;
            cursor: pointer;
        }
        .login-msg {
            min-height: 22px;
            margin-top: 14px;
            text-align: center;
            font-size: 14px;
            color: #ff8d8d;
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <h1 class="login-title">设备环境监测平台</h1>
            <p class="login-subtitle">请输入账号和密码后登录</p>
            <form id="login_form">
                <label class="login-field">
                    <span>账号</span>
                    <input id="username" type="text" value="root" autocomplete="username">
                </label>
                <label class="login-field">
                    <span>密码</span>
                    <input id="password" type="password" value="root01" autocomplete="current-password">
                </label>
                <button type="submit" class="login-btn">登录</button>
            </form>
            <div id="login_msg" class="login-msg"></div>
        </div>
    </div>
    <script>
        (function () {
            var form = document.getElementById('login_form');
            var msg = document.getElementById('login_msg');

            form.addEventListener('submit', function (event) {
                event.preventDefault();
                msg.textContent = '';
                fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: document.getElementById('username').value.trim(),
                        password: document.getElementById('password').value.trim()
                    })
                }).then(function (response) {
                    return response.json().then(function (data) {
                        return { ok: response.ok, data: data };
                    });
                }).then(function (result) {
                    if (result.ok && result.data && result.data.code === 0) {
                        window.location.href = '/';
                        return;
                    }
                    msg.textContent = '登陆失败';
                }).catch(function () {
                    msg.textContent = '登陆失败';
                });
            });
        })();
    </script>
</body>
</html>
